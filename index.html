<!DOCTYPE html>
<html lang="th">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จองคิว Ice Bath</title>
 
  <style>
    body { 
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: #111827;
      padding: 24px;
      border-radius: 18px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input, select, textarea {
      background: #fff;
      color: #111;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .price-box {
      margin-top: 18px;
      background: #1e293b;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.7;
    }

    button {
      margin-top: 22px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #64748b;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5e1;
      text-align: center;
    }

    .success {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #166534;
      text-align: center;
    }
    option:disabled {
  color: #999;
}
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <div class="container">
    <h1>ICE BATH</h1>
    <div class="subtitle">จองคิวแช่น้ำแข็ง สถานีนักกล้าม</div>

    <form id="bookingForm">
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="name" required placeholder="กรอกชื่อของคุณ" />

      <label>เบอร์โทร</label>
      <input type="tel" id="phone" required placeholder="เช่น 0812345678" />

      <label>วันที่ต้องการจอง</label>
      <input type="date" id="date" required />

      <label>เวลาที่ต้องการจอง</label>
      <select id="time" required>
  <option value="">เลือกเวลา</option>
  <option value="06:30">06:30</option>
  <option value="07:15">07:15</option>
  <option value="08:00">08:00</option>
  <option value="08:45">08:45</option>
  <option value="09:30">09:30</option>
  <option value="10:15">10:15</option>
  <option value="11:00">11:00</option>
  <option value="11:45">11:45</option>
  <option value="12:30">12:30</option>
  <option value="13:15">13:15</option>
  <option value="14:00">14:00</option>
  <option value="14:45">14:45</option>
  <option value="15:30">15:30</option>
  <option value="16:15">16:15</option>
  <option value="17:00">17:00</option>
  <option value="17:45">17:45</option>
  <option value="18:30">18:30</option>
  <option value="19:15">19:15</option>
  <option value="20:00">20:00</option>
  <option value="20:45">20:45</option>
</select>

      <label>แพ็กเกจ</label>
      <select id="package" required>
        <option value="">เลือกแพ็กเกจ</option>
        <option value="1 คน 300 บาท / 20 นาที">1 คน 300 บาท / 20 นาที</option>
        <option value="2 คน 500 บาท / 20 นาที">2 คน แช่รวมกัน 500 บาท / 20 นาที</option>
      </select>

      <label>หมายเหตุเพิ่มเติม</label>
      <textarea id="note" placeholder="เช่น ต้องการช่วงเวลาใกล้เคียง ฯลฯ"></textarea>

      <div class="price-box">
        <strong>ราคา</strong><br>
        1 คน: 300 บาท / 20 นาที<br>
        2 คน: 500 บาท / 20 นาที<br>
        *Pre-booking เท่านั้น
      </div>

      <button type="submit" id="submitBtn">ส่งข้อมูลการจอง</button>
    </form>

<div class="success" id="successBox">
  <h3>✅ ยืนยันการจองสำเร็จ</h3>
  

  <button type="button" onclick="liff.closeWindow()">
    ปิดหน้าต่าง
  </button>
</div>

    <div class="note">
      ขอบคุณที่ใช้บริการครับ
    </div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxun-Lm6DFq5GUu5jeeDleemmCsKB4sDCJRb17_MEHInBWwskQOaG1ZMgUOlJWsrEE/exec";
const LIFF_ID = "2010600499-kGjbynE1";

const form = document.getElementById("bookingForm");
const submitBtn = document.getElementById("submitBtn");
const successBox = document.getElementById("successBox");

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
  } catch (err) {
    console.log("LIFF init error", err);
  }
}

initLiff();

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  // กันกดซ้ำ
  if (submitBtn.disabled) return;

  submitBtn.disabled = true;
  submitBtn.innerText = "กำลังตรวจสอบคิว...";

  let lineUserId = "";

  try {
  if (typeof liff !== "undefined") {
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;
  }
} catch (err) {
  alert("ดึงข้อมูล LINE ไม่สำเร็จ กรุณาเปิดผ่านแอป LINE");
  submitBtn.disabled = false;
  submitBtn.innerText = "ส่งข้อมูลการจอง";
  return;
}
  
  const data = {
    userId: lineUserId,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    package: document.getElementById("package").value,
    note: document.getElementById("note").value
  };

try {

  const bookedRes = await fetch(
    SCRIPT_URL +
    "?action=bookedTimes" +
    "&date=" + encodeURIComponent(data.date) +
    "&package=" + encodeURIComponent(data.package)
  );

  const bookedTimes = await bookedRes.json();

if (bookedTimes.includes(data.time)) {
  alert("เต็มแล้ว กรุณาเลือกเวลาอื่น");
  submitBtn.disabled = false;
  submitBtn.innerText = "ส่งข้อมูลการจอง";
  await loadBookedTimes();
  return;
}

} catch(err) {
  alert("ERROR: " + err.message);
  console.log(err);
  submitBtn.disabled = false;
  submitBtn.innerText = "ส่งข้อมูลการจอง";
  return;
}
  


submitBtn.innerText = "กำลังส่งข้อมูล...";

fetch(SCRIPT_URL, {
  method: "POST",
  mode: "no-cors",
  body: JSON.stringify(data)
});

form.style.display = "none";
successBox.style.display = "block";

});

async function loadBookedTimes() {

  const selectedDate =
    document.getElementById("date").value;

  const selectedPackage =
    document.getElementById("package").value;

  if (!selectedDate || !selectedPackage) return;

  const res = await fetch(
    SCRIPT_URL +
    "?action=bookedTimes" +
    "&date=" + encodeURIComponent(selectedDate) +
    "&package=" + encodeURIComponent(selectedPackage)
  );

  const bookedTimes = await res.json();

  const timeSelect = document.getElementById("time");

  Array.from(timeSelect.options).forEach(option => {

    if (!option.value) return;

    if (bookedTimes.includes(option.value)) {

      option.disabled = true;
      option.text = option.value + " (เต็ม)";

    } else {

      option.disabled = false;
      option.text = option.value;
    }
  });
}
  
  document.getElementById("date")
  .addEventListener("change", loadBookedTimes);

document.getElementById("package")
  .addEventListener("change", loadBookedTimes);
</script>
</body>
</html>
