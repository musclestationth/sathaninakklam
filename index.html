<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จองคิว Ice Bath</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: #111827;
      padding: 24px;
      border-radius: 18px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input, select, textarea {
      background: #fff;
      color: #111;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .price-box {
      margin-top: 18px;
      background: #1e293b;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.7;
    }

    button {
      margin-top: 22px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #64748b;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5e1;
      text-align: center;
    }

    .success {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #166534;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ICE BATH</h1>
    <div class="subtitle">จองคิวแช่น้ำแข็ง สถานีนักกล้าม</div>

    <form id="bookingForm">
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="name" required placeholder="กรอกชื่อของคุณ" />

      <label>เบอร์โทร</label>
      <input type="tel" id="phone" required placeholder="เช่น 0812345678" />

      <label>วันที่ต้องการจอง</label>
      <input type="date" id="date" required />

      <label>เวลาที่ต้องการจอง</label>
      <input type="time" id="time" required />

      <label>แพ็กเกจ</label>
      <select id="package" required>
        <option value="">เลือกแพ็กเกจ</option>
        <option value="1 คน 300 บาท / 20 นาที">1 คน 300 บาท / 20 นาที</option>
        <option value="2 คน 500 บาท / 20 นาที">2 คน แช่รวมกัน 500 บาท / 20 นาที</option>
      </select>

      <label>หมายเหตุเพิ่มเติม</label>
      <textarea id="note" placeholder="เช่น มากี่คน, ต้องการช่วงเวลาใกล้เคียง ฯลฯ"></textarea>

      <div class="price-box">
        <strong>ราคา</strong><br>
        1 คน: 300 บาท / 20 นาที<br>
        2 คน: 500 บาท / 20 นาที<br>
        *Pre-booking เท่านั้น
      </div>

      <button type="submit" id="submitBtn">ส่งข้อมูลการจอง</button>
    </form>

    <div class="success" id="successBox">
      ส่งข้อมูลเรียบร้อยแล้ว<br>
      กรุณารอพนักงานยืนยันคิว
    </div>

    <div class="note">
      หากต้องการเปลี่ยนแปลงเวลา กรุณาติดต่อพนักงานเคาน์เตอร์
    </div>
  </div>

  <script>
    const form = document.getElementById("bookingForm");
    const submitBtn = document.getElementById("submitBtn");
    const successBox = document.getElementById("successBox");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        package: document.getElementById("package").value,
        note: document.getElementById("note").value
      };

      console.log("Booking data:", data);

      submitBtn.disabled = true;
      submitBtn.innerText = "ส่งข้อมูลแล้ว";

      form.style.display = "none";
      successBox.style.display = "block";
    });
  </script>
</body>
</html>
